
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WR ID AT — Вход</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="background"></div>

<div class="login-card">

    <div class="logo">
        <div class="logo-circle">WR</div>

        <h1>WR ID AT</h1>

        <p>Единый аккаунт экосистемы WR</p>
    </div>

    <form id="loginForm">

        <label>Юзернейм</label>

        <input
            type="text"
            id="username"
            placeholder="@username"
            required
        >

        <label>Пароль</label>

        <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
        >

        <button type="submit">
            Войти
        </button>

    </form>

    <div class="divider"></div>

    <a class="register-btn" href="register.html">
        Создать аккаунт
    </a>

</div>

<script src="js/app.js"></script>

</body>
</html>
