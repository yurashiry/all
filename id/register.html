<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WR ID AT — Регистрация</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="background"></div>

<div class="login-card">

    <div class="logo">

        <img src="img/logo.svg" class="logo-image">

        <h1>Создать WR ID</h1>

        <p>Регистрация нового аккаунта</p>

    </div>

    <form id="registerForm">

        <label>Юзернейм</label>

        <input
            type="text"
            id="username"
            placeholder="@username"
            required
        >

        <label>Имя пользователя</label>

        <input
            type="text"
            id="name"
            placeholder="Ваше имя"
            required
        >

        <label>Пароль</label>

        <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
        >

        <button>

            Создать аккаунт

        </button>

    </form>

    <div class="divider"></div>

    <a class="register-btn" href="index.html">

        Уже есть аккаунт?

    </a>

</div>

<script src="js/register.js"></script>

</body>

</html>
