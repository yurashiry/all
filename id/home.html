<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WR ID AT</title>

    <link rel="stylesheet" href="css/home.css">
</head>

<body>

<div class="background"></div>

<div class="container">

    <!-- Профиль -->

    <div class="profile-card">

        <div class="avatar" id="avatar">
            Y
        </div>

        <h1 id="displayName">
            Yuri
            <span id="blueBadge" class="badge blue" style="display:none;">✔</span>
            <span id="plusBadge" class="badge green" style="display:none;">+</span>
        </h1>

        <p id="username">
            @username
        </p>

    </div>

    <!-- QR -->

    <div class="card">

        <button id="qrButton" class="main-btn">
            📱 Открыть QR-код
        </button>

    </div>

    <!-- Карты -->

    <div class="card">

        <div class="card-title">

            💳 Привязанные карты

        </div>

        <div id="cardsContainer">

            <div class="empty">

                Пока нет привязанных карт

            </div>

        </div>

        <button id="addCard">

            + Добавить карту

        </button>

    </div>

    <!-- Настройки -->

    <div class="card">

        <div class="card-title">

            ⚙️ Настройки

        </div>

        <button onclick="location.href='settings.html'">

            Настройки профиля

        </button>

        <button id="logout">

            Выйти

        </button>

    </div>

</div>

<!-- QR окно -->

<div id="qrModal" class="modal">

    <div class="modal-content">

        <span id="closeQR">&times;</span>

        <h2>

            QR WR ID

        </h2>

        <div id="qrcode"></div>

    </div>

</div>

<!-- Добавление карты -->

<div id="cardModal" class="modal">

    <div class="modal-content">

        <span id="closeCard">&times;</span>

        <h2>

            Новая карта

        </h2>

        <select id="cardType">

            <option>Visa</option>
            <option>Mastercard</option>
            <option>Мир</option>

        </select>

        <input
            id="cardNumber"
            maxlength="19"
            placeholder="Номер карты">

        <button id="saveCard">

            Сохранить

        </button>

    </div>

</div>

<script src="js/qrcode.min.js"></script>
<script src="js/home.js"></script>

</body>
</html>
