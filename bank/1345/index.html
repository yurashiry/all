<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRB — YURIY SHIRYAEV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f16 0%, #141c26 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        .card-container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 30px 50px -15px rgba(0,0,0,0.7);
            transition: transform 0.2s;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* переливающаяся надпись */
        .shimmer-text {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(120deg, #ffd966, #ffb347, #ff6b6b, #ffd966);
            background-size: 300% 300%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: shimmer 3s ease infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-info {
            padding: 1.8rem;
            color: #f5f7fe;
        }

        .id-section {
            background: rgba(0,0,0,0.6);
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            margin-bottom: 1.2rem;
            border-left: 3px solid #ffd966;
        }

        .id-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .card-id {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: 1.5px;
            color: #ffecb3;
        }

        .real-details {
            background: rgba(255,255,255,0.08);
            border-radius: 1rem;
            padding: 1rem;
        }

        .real-number {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 600;
            background: #00000050;
            padding: 0.3rem 0.6rem;
            border-radius: 12px;
            display: inline-block;
            margin: 5px 0;
        }

        .exp-cvv {
            display: flex;
            gap: 1rem;
            margin: 8px 0;
            font-size: 0.85rem;
        }

        .holder {
            margin-top: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
            border-top: 1px dashed #ffffff40;
            padding-top: 8px;
        }

        .btn-reveal {
            background: #ffd96622;
            border: 1px solid #ffd966aa;
            color: #ffecb3;
            font-size: 0.7rem;
            padding: 0.3rem 1rem;
            border-radius: 100px;
            cursor: pointer;
            margin-top: 12px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-reveal:hover {
            background: #ffd966aa;
            color: #0b1420;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #a0aab5;
        }

        .sonne {
            font-weight: 800;
        }
    </style>
</head>
<body>
<div class="card-container">
    <div class="card">
        <div class="card-info">
            <div class="shimmer-text">◈ HAORÏK / WRB ◈</div>

            <div class="id-section">
                <div class="id-label">ID КАРТЫ</div>
                <div class="card-id">9132 1345 16</div>
            </div>

            <div class="real-details" id="realDetails">
                <div class="real-number" style="filter: blur(5px);">•••• •••• •••• ••••</div>
                <div class="exp-cvv" style="filter: blur(4px);">••/•• •••</div>
                <div class="holder" style="filter: blur(3px);">•••••• ••••••••</div>
                <button class="btn-reveal" id="revealBtn">Показать данные карты</button>
            </div>
        </div>
    </div>
    <div class="footer">
        <div class="sonne">sonne™</div>
        <div>WRB является банком, выпускающим карты и проводящим операции в России и Алтайске.</div>
    </div>
</div>

<script>
    const realData = {
        pan: "2204 3211 4355 5753",
        expiry: "03/36",
        cvv: "069",
        holder: "YURIY SHIRYAEV"
    };

    const revealBtn = document.getElementById('revealBtn');
    const detailsDiv = document.getElementById('realDetails');

    revealBtn.addEventListener('click', () => {
        if (detailsDiv.getAttribute('data-revealed') === 'true') return;
        detailsDiv.innerHTML = `
            <div class="real-number">${realData.pan}</div>
            <div class="exp-cvv">${realData.expiry}  ${realData.cvv}</div>
            <div class="holder">${realData.holder}</div>
            <button class="btn-reveal" disabled style="opacity:0.5; cursor:default;">Данные открыты</button>
        `;
        detailsDiv.setAttribute('data-revealed', 'true');
    });
</script>
</body>
</html>
