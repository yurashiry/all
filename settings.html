<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WR ID AT — Настройки</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/settings.css">
</head>
<body>

<div class="background"></div>

<div class="settings-card">

    <h1>⚙ Настройки профиля</h1>

    <!-- Изменение имени -->
    <div class="block">

        <label>Имя пользователя</label>

        <input type="text" id="newName" placeholder="Новое имя">

        <button id="saveName">Сохранить имя</button>

    </div>

    <!-- Изменение пароля -->
    <div class="block">

        <label>Пароль</label>

        <input type="password" id="newPassword" placeholder="Новый пароль">

        <button id="savePassword">Изменить пароль</button>

    </div>

    <hr>

    <!-- Опасные действия -->

    <div class="block danger">

        <button id="logoutBtn">Выйти из аккаунта</button>

        <button id="deleteBtn">Удалить аккаунт</button>

    </div>

    <a href="home.html" class="back">
        ← Назад в профиль
    </a>

</div>

<script src="js/settings.js"></script>

</body>
</html>
