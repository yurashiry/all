<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WR ID AT</title>
<link rel="stylesheet" href="css/home.css">
</head>
<body>

<div class="bg"></div>

<div class="container">

<div class="profile">
<div class="avatar" id="avatar"></div>

<div class="info">
<h2 id="name"></h2>
<p id="username"></p>
</div>

<div class="badges">
<span id="blue" class="badge blue">✔</span>
<span id="plus" class="badge green">+</span>
</div>
</div>

<div class="card">
<button onclick="openQR()">Открыть QR</button>
<button onclick="openCard()">Карты</button>
<button onclick="logout()">Выйти</button>
</div>

<div id="qrModal" class="modal">
<div class="modalBox">
<h3>QR Code</h3>
<canvas id="qrCanvas"></canvas>
<button onclick="closeQR()">Закрыть</button>
</div>
</div>

<div id="cardModal" class="modal">
<div class="modalBox">
<h3>Карты</h3>

<input id="cardNumber" placeholder="Номер карты">
<select id="cardType">
<option>Visa</option>
<option>Mastercard</option>
<option>Мир</option>
</select>

<button onclick="saveCard()">Сохранить</button>

<div id="cards"></div>

<button onclick="closeCard()">Закрыть</button>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="js/home.js"></script>

</body>
</html>
