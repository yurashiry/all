  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #000000;
      background-size: 100% 100%;
    }

    .splash-text-class {
      margin: 0;
      position: absolute;
      top: calc(50% + 50px);
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
      font-family: 'Nunito Sans', sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 20px;
      letter-spacing: 0px;
      text-align: center;
      color: white;
      user-select: none;
      /* Make the text unselectable */
      transition: opacity 500ms linear;
    }

    .splash-logo-class {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateY(-29px);
      -ms-transform: translate(-50%, -50%) translateY(-29px);
      width: 333px;
      height: 62px;
    }

    .splash-stars-class {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      -ms-transform: translate(-50%, -50%);
      width: 556px;
      height: 250px;
      user-select: none;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%) scale(1.5);
      transform: translate(-50%, -50%) scale(1.5);
      user-select: none;
    }
  </style>

  <p id="dynamic-text" class="splash-text-class">Подготавливаем ваш кинозал</p>
  <img id="splash-logo" class="splash-logo-class" src="splash/img/logo_full.png" alt="">
  <img id="splash-stars" class="splash-text-class" src="splash/img/stars.gif" alt="">

  <script>
    window.__splashRemoved = false;
    window.removeSplashFromWeb = function () {
      if (window.__splashRemoved) {
        return;
      }
      window.__splashRemoved = true;
      document.getElementById("dynamic-text")?.remove();
      document.getElementById("splash-logo")?.remove();
      document.getElementById("splash-stars")?.remove();
      document.querySelector(".loader")?.remove();
      document.body.style.backgroundColor = "#000000";
    };

    window.addEventListener('flutter-first-frame', function () {
      window.removeSplashFromWeb();
    });

    setTimeout(function () {
      window.removeSplashFromWeb();
    }, 15000);
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var textElement = document.getElementById('dynamic-text');
      var phrases = [
        "Подготавливаем ваш кинозал",
        "Собираем новинки фильмов и сериалов",
        "Выбираем лучшие кадры для вас",
        "Настраиваем идеальный звук",
        "Завершаем подготовку к премьере"
      ];
      var index = 1;

      function changeText() {
        textElement.style.opacity = 0;
        setTimeout(function () {
          textElement.textContent = phrases[index];
          textElement.style.opacity = 1;
          index = (index + 1) % phrases.length;
        }, 300);

      }

      setInterval(changeText, 1500);
    });

  </script>
