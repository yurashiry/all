<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Юрий Ширяев — официальная страница</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b1120, #19233c);
            font-family: system-ui, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 560px;
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 36px 28px;
            border: 1px solid rgba(38, 165, 228, 0.3);
            box-shadow: 0 25px 40px -12px black;
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 2.2rem;
            margin: 0 0 8px;
            background: linear-gradient(135deg, #fff, #7aa9e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .desc {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 32px;
            border-bottom: 1px dashed #2c3e66;
            display: inline-block;
            padding-bottom: 6px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 260px;
            padding: 14px 0;
            border-radius: 60px;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.05rem;
            transition: all 0.2s;
        }
        .telegram {
            background: #26a5e4;
            color: white;
            box-shadow: 0 5px 12px #26a5e450;
        }
        .vk {
            background: #0077ff;
            color: white;
            box-shadow: 0 5px 12px #0077ff40;
        }
        .btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }
        .footer {
            margin-top: 36px;
            font-size: 12px;
            opacity: 0.55;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Юрий Ширяев</h1>
    <div class="desc">@wr_cha · официальный канал</div>

    <div class="links">
        <a href="https://t.me/wr_cha" class="btn telegram" target="_blank" rel="noopener">
            📱 Telegram / @wr_cha
        </a>
        <a href="https://vk.com/shiryyurs" class="btn vk" target="_blank" rel="noopener">
            🌐 VK · верифицированная страница
        </a>
    </div>
    <div class="footer">
        Официальный сайт · ссылки только на подтверждённые аккаунты
    </div>
</div>
</body>
</html>
